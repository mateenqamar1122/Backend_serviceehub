version: "3.9"

services:
  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicehub-backend
    image: servicehub-backend:latest
    ports:
      - "8000:8000"
    environment:
      # Application settings
      APP_NAME: "ServiceHub"
      DEBUG: "false"
      ENVIRONMENT: "production"

      # Database (Supabase or local PostgreSQL)
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://servicehub_user:servicehub_password@postgres:5432/servicehub}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # JWT & Auth
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}

      # CORS
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8000,http://frontend:3000"
      CORS_CREDENTIALS: "true"

      # Email (SMTP)
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}

      # AWS S3 (if using for file uploads instead of Supabase)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-servicehub-uploads}
      AWS_REGION: ${AWS_REGION:-us-east-1}

    env_file:
      - .env

    depends_on:
      - postgres

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - servicehub-network

    volumes:
      - ./app:/app/app

    # Uncomment for development mode with auto-reload
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database (Optional - use if not using Supabase Cloud DB)
  postgres:
    image: postgres:15-alpine
    container_name: servicehub-postgres
    environment:
      POSTGRES_USER: servicehub_user
      POSTGRES_PASSWORD: servicehub_password
      POSTGRES_DB: servicehub
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database_Schemas/SERVICEHUB_SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehub_user"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - servicehub-network

  # Redis Cache (Optional - for sessions/caching)
  redis:
    image: redis:7-alpine
    container_name: servicehub-redis
    ports:
      - "6379:6379"

    command: redis-server --appendonly yes --requirepass servicehub_redis_password

    volumes:
      - redis_data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - servicehub-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  servicehub-network:
    driver: bridge

