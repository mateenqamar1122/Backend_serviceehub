version: '3.9'

services:
  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicehub-backend
    ports:
      - "8000:8000"
    environment:
      # Application Settings
      APP_NAME: "ServiceHub"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
      ENVIRONMENT: "production"
      API_VERSION: "v1"
      API_PREFIX: "/api/v1"

      # Supabase Configuration (Replace with your credentials)
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_KEY: "${SUPABASE_KEY}"
      SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_KEY}"

      # JWT & Security
      SECRET_KEY: "${SECRET_KEY}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

      # Database (PostgreSQL via Supabase)
      DATABASE_URL: "${DATABASE_URL}"

      # CORS
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}"

      # File Upload
      FILE_UPLOAD_PATH: "/app/uploads"
      MAX_UPLOAD_SIZE_MB: "50"

    volumes:
      - ./app:/app/app
      - uploads_volume:/app/uploads
    depends_on:
      - postgres
    networks:
      - servicehub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # PostgreSQL Database (Optional - if not using Supabase cloud)
  postgres:
    image: postgres:15-alpine
    container_name: servicehub-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-servicehub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-servicehub_password}
      POSTGRES_DB: ${DB_NAME:-servicehub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database_Schemas/SERVICEHUB_SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - servicehub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-servicehub_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for Caching (Optional)
  redis:
    image: redis:7-alpine
    container_name: servicehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - servicehub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_volume:
  redis_data:

networks:
  servicehub-network:
    driver: bridge

